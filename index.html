<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Pierre Donias — Senior Web Developer at Vates SAS">
  <title>Pierre Donias</title>
  <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --text: #1c2128;
        --muted: #636e7b;
        --accent: #0550ae;
        --border: #d8dee4;
        --hover-bg: #f3f4f6;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #e6edf3;
        --muted: #848d97;
        --accent: #58a6ff;
        --border: #30363d;
        --hover-bg: #161b22;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .role {
      margin-top: 0.6rem;
      font-size: 1rem;
      color: var(--muted);
    }

    .role a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .role a:hover {
      text-decoration: underline;
    }

    .bio {
      margin-top: 1.75rem;
      font-size: 0.9375rem;
      line-height: 1.75;
      color: var(--text);
      opacity: 0.85;
    }

    hr {
      margin: 2rem 0;
      border: none;
      border-top: 1px solid var(--border);
    }

    ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin: -0.4rem;
    }

    ul li a {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.4rem 0.75rem;
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      border-radius: 6px;
      transition: color 0.15s, background-color 0.15s;
    }

    ul li a:hover {
      color: var(--text);
      background-color: var(--hover-bg);
    }

    ul li a svg {
      flex-shrink: 0;
    }
  </style>
</head>
